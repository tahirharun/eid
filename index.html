<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="moon"></div>
<div class="card">
    <h1>Eid Mubarak!</h1>
    <p>Wishing you joy, peace, and happiness on this blessed day, May Allah bless this day.</p>
    <button id="shareBtn">Share the Joy</button>
    <div id="shareOptions" class="share-options">
        <button data-platform="whatsapp">WhatsApp</button>
        <button data-platform="twitter">X</button>
        <button data-platform="gmail">Gmail</button>
    </div>
    <button id="nasheedBtn">Play Nasheed</button>
</div>
<script src="script.js"></script>
</body>
</html>
